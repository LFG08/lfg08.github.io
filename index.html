<!DOCTYPE html>
<html>
<head>

<title>vários nadas</title>

<style>

body{
margin:0;
font-family: Georgia, serif;
background:#3b1200;
color:#f5e6d3;

}

/* HEADER IMAGE */

.header{
width:100%;
height:220px; /* adjust height */
background-image:url("./mandala_header.jpg");
background-size:cover;
background-position:center;
}

/* TITLE */

.title{
text-align:center;
margin-top:-70px;
}

.title h1{
font-size:48px;
margin:10px 0;
}

.subtitle{
font-size:14px;
opacity:0.8;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
gap:20px;
padding:40px;
}

/* CARD */

.card{
background:#4a1a05;
padding:10px;
text-align:center;
transition:0.3s;
cursor:pointer;
}

.card img{
width:100%;
display:block;
}

.card:hover{
transform:scale(1.03);
background:#5c2208;
}

/* TAGS */

.tags{
font-size:12px;
margin-top:8px;
opacity:0.7;
}

</style>

</head>

<body>

<div class="header"></div>

<div class="title">
<h1>vários nadas</h1>
<div class="subtitle">✨ mandalas interativas ✨</div>
</div>

<div class="grid">

<a href="https://lfg08.github.io/isa-mandala-puzzle/" class="card">
<img src="https://lfg08.github.io/isa-mandala-puzzle/Isa2026.png">
<div class="tags">#mandala #game</div>
</a>

<a href="https://lfg08.github.io/unrealunearth/" class="card">
<img src="https://lfg08.github.io/unrealunearth/unreal.png">
<div class="tags">#blue #puzzle</div>
</a>

<a href="TARITS" class="card">
<img src="TARITS/mandala.png">
<div class="tags">#gold #challenge</div>
</a>

</div>

</body>
</html>
