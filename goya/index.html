<!DOCTYPE html>
<html>

<head>

<title>El Aquelarre</title>
<link rel="icon" type="image/png" href="/VN.png" sizes="32x32">
  
<style>

/* ================= MANDALA ================= */

.container{
position:relative;
width:2048px;
height:2048px;
contain:layout paint;
transition:transform 0.25s ease;
}

.container img{
position:absolute;
top:0;
left:0;
}

/* ================= ANSWER OVERLAY ================= */

#answersOverlay{
position:absolute;
top:0;
left:0;
width:2048px;
height:2048px;
pointer-events:none;
}

.answerClip{
position:absolute;
top:0;
left:0;
width:2048px;
height:2048px;

background-image:url("mandala_gabarito_1.png");
background-size:2048px 2048px;

opacity:0;
transition:opacity 0.12s linear;
}

.answerClip.visible{
opacity:1;
}

/* ================= BACKGROUND ================= */

body{
background:rgb(0, 8, 14);
margin:0;
overflow:auto;
cursor:grab;
user-select:none;
}

body.dragging{
cursor:grabbing;
}

/* ================= MENU ================= */

#wordMenu{
  position:fixed;
  top:120px;
  left:30px;   /* ← anchor it here */
  width: 250px;;

  max-height:70vh;

  background:rgba(0,0,0,0.418);
  border:1px solid white;
  color:white;

  font-family:'Times New Roman', Times, serif;
  font-size:0.9rem;

  display:flex;
  flex-direction:column;
  z-index:20;
}

#menuHeader{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:6px;
}
/* LEFT SIDE */
.title {
  flex-shrink:inherit;
  margin-right: 4px;
  margin-left: 8px;
  margin-top: 8px;
}

/* RIGHT SIDE GROUP */
.right{
  display:flex;
  align-items:center;
  gap:6px;
  flex-shrink:0; /* prevents collapsing weirdness */
  margin-right: 8px;
}

/* COUNTER */
#counter {
  white-space: nowrap;
}

/* ================= INFO ================= */

.info-wrapper {
  position: relative;
  display: inline-block;
}

.info-wrapper::after {
  content: "";
  position: absolute;
  top: 100%;
  left: 0;
  width: 100%;
  height: 6px; /* invisible bridge */
}

.info-btn,
.menu-btn{
  
  display: flex;              /* KEY */
  align-items: center;        /* vertical center */
  justify-content: center;    /* horizontal center */
  
  width: 16px;
  height: 16px;
  border-radius: 50%;
  border: none;
  font-size: 11px;
  cursor: pointer;
  background: #ccc;
  line-height: 16px;
  padding: 0;
  margin-right: 4px;
}

.tooltip {
  position: absolute;
  top: 100%;
  left: 0;
  width: 180px;
  margin-top: 4px; /* small, safe gap */

  background: rgba(0,0,0,0.85);
  color: white;
  font-size: 12px;
  padding: 8px;
  border-radius: 6px;

  opacity: 0;
  pointer-events: none;
  transition: 0.2s;
}

/* show tooltip when hovering button OR tooltip itself */
.info-wrapper:hover .tooltip {
  opacity: 1;
  pointer-events: auto;
  }

.tooltip a {
  text-decoration: none;
}

.tooltip a:hover {
  text-decoration: none; /* optional: add back on hover */
}

.highlight {
  color: #d8c200;
  text-decoration: none
}

.highlight:hover{
  text-decoration: none;
}

#wordList{
flex:1;
overflow-y:auto;

list-style:none;
margin:0;
padding:8px;
line-height:1.4;
}

#wordList li{
padding:4px 0;
}

#wordList a[href] {
  color: rgb(172, 141, 3);
}

.found{
text-decoration:line-through;
opacity:0.6;
}

.hidden-word{
color:transparent;
position:relative;
}

/* show ???? initially */
.hidden-word::before{
content:"?";
position:absolute;
left:0;
color:rgba(255,255,255,0.3);
}

/* when found → show real word */
.hidden-word.found::before{
content:attr(data-hidden);
color:#f5e6d3;
text-decoration: line-through;
}

.collapsed #wordList{
display:none;
}

#wordTooltip{
position:fixed;
background:rgba(0,0,0,0.85);
color:#f5e6d3;
padding:6px 10px;
font-size:12px;
font-family:Georgia, serif;
border:1px solid #f5e6d3;
pointer-events:none;
opacity:0;
transition:opacity 0.15s;
z-index:999;
}

#overlaySelector,
#clearButton,
#toggleClickMode,
#rotateMandala{

border:none;
border-top:1px solid white;

background:rgba(0,0,0,0.418);
color:white;

padding:8px;
font-family:'Times New Roman', Times, serif;
cursor:pointer;

}

</style>

</head>

<body>

<!-- ================= MENU ================= -->

<div id="wordMenu">

<div id="menuHeader">
<span class="title">El Aquelarre</span>

<div class="right">
<span id="counter">0 / 20</span>

<span class="info-wrapper">
    <button class="info-btn">i</button>

    <span class="tooltip">
      Mandala inspirada em <a href="https://pt.wikipedia.org/wiki/El_Aquelarre_(1798)" class= highlight>"El Aquelarre" de Goya (1797-1798)</a>.
    </span>
  </span>
  <a class="menu-btn" href="/" >☰</a>
  <button id="toggleMenu">–</button>

<ul id="wordList">

<li id="menu-Lua">Lua</li>
<li id="menu-Pacto">Pacto</li>
<li id="menu-Ritual">Ritual</li>
<li id="menu-Sabbath" data-def="Encontro ritualístico associado à bruxaria.">Sabbath</li>
<li id="menu-Terra">Terra</li>

<li id="menu-Gato" class="hidden-word" data-hidden="Gato">????</li>
<li id="menu-Corvo" class="hidden-word" data-hidden="Corvo">?????</li>
<li id="menu-Pentagrama" class="hidden-word" data-hidden="Pentagrama">??????????</li>

</ul>

<div id="wordTooltip"></div>
  
<button id="clearButton" onclick="confirmReset()">Reset</button>
<button id="toggleClickMode">Desmarcar: ON</button>
<button id="rotateMandala">Rotate (0°)</button>

<select id="overlaySelector">
<option value="mandala_gabarito_1.png">Roxo</option>
<option value="mandala_gabarito_2.png">Roxo só que diferente</option>
</select>

</div>

<!-- ================= MANDALA ================= -->

<div class="container">

<img src="mandala_goya.png" usemap="#image-map">

<div id="answersOverlay"></div>

</div>

<!-- ================= SCRIPT ================= -->

<script>

/* prevent image dragging */
document.addEventListener("dragstart", e=>e.preventDefault());

/* load */
window.addEventListener("load", function(){

  
updateCounter();

/* restore overlay OR set default */
let savedOverlay = localStorage.getItem("selectedOverlay");

if(savedOverlay){
  currentOverlay = savedOverlay;
  overlaySelector.value = savedOverlay;
}else{
  // FIRST TIME → force option 1
  currentOverlay = "mandala_gabarito_1.png";
  overlaySelector.value = "mandala_gabarito_1.png";
}
  
/* apply overlay immediately */
overlaySelector.dispatchEvent(new Event("change"));

/* load answers AFTER overlay is ready */
loadProgress();
});


/* ===== toggle mode ===== */

let allowToggleOff=true;

toggleClickMode.onclick=function(){

allowToggleOff=!allowToggleOff;

this.textContent=allowToggleOff
? "Desmarcar: ON"
: "Desmarcar: OFF";
};

/* OVERLAY */

overlaySelector.onchange = function(){

currentOverlay = this.value;

Object.values(answerClips).forEach(clip=>{
clip.style.backgroundImage = "url('" + currentOverlay + "')";
});

localStorage.setItem("selectedOverlay", currentOverlay);
};

/* ===== menu items ===== */

const menuItems={};

document.querySelectorAll("#wordList li").forEach(li=>{
menuItems[li.id]=li;
});

/* ===== menu definitions ===== */

const tooltip = document.getElementById("wordTooltip");

document.querySelectorAll("#wordList li").forEach(item => {

item.addEventListener("mouseenter", e => {

let text = item.dataset.def;
if(!text) return;

tooltip.textContent = text;
tooltip.style.opacity = "1";

});

item.addEventListener("mousemove", e => {

tooltip.style.left = (e.clientX + 10) + "px";
tooltip.style.top = (e.clientY + 10) + "px";

});

item.addEventListener("mouseleave", () => {

tooltip.style.opacity = "0";

});

});


  
/* ===== answer highlights ===== */

const answerClips={};

function toggleAnswer(area,word){

if(!area.coords) return;

if(!answerClips[word]){

let coords=area.coords.split(",");
let points=[];

for(let i=0;i<coords.length;i+=2){
points.push(coords[i]+"px "+coords[i+1]+"px");
}

let clip = document.createElement("div");
clip.className = "answerClip";
clip.style.clipPath = "polygon(" + points.join(",") + ")";
clip.style.backgroundImage = "url('" + currentOverlay + "')";

const answersOverlay = document.getElementById("answersOverlay");

answersOverlay.appendChild(clip);

answerClips[word]=clip;
}

let isVisible = answerClips[word].classList.contains("visible");

if(!isVisible){

  answerClips[word].classList.add("visible");
  menuItems["menu-"+word].classList.add("found");

}else if(allowToggleOff){

  answerClips[word].classList.remove("visible");
  menuItems["menu-"+word].classList.remove("found");

}

updateCounter();
saveProgress();
}
  
/*counter*/
function updateCounter(){

let found = document.querySelectorAll("#wordList li.found").length;
let total = document.querySelectorAll("#wordList li").length;

document.getElementById("counter").textContent =
found + " / " + total;
}

/* SAVE PROGRESS */

function loadProgress(){

let saved = localStorage.getItem("goyaPuzzleProgress");
if(!saved) return;

let words = JSON.parse(saved);

words.forEach(word => {

let area = document.querySelector(
`area[onclick*="${word}"]`
);

if(area){

// ONLY toggle if it's not already visible
if(!answerClips[word] || 
   !answerClips[word].classList.contains("visible")){

toggleAnswer(area, word);
}
}
});
}

/* ===== reset ===== */

function clearAll(){

for(let word in answerClips){
answerClips[word].classList.remove("visible");
}

document.querySelectorAll("#wordList li")
.forEach(li=>li.classList.remove("found"));

localStorage.removeItem("goyaPuzzleProgress");
updateCounter();
}

function confirmReset(){

if(confirm("Reset?")){
clearAll();
localStorage.removeItem("goyaPuzzleProgress");
}

  }

/* ===== menu drag ===== */

let menu=wordMenu;
let header=menuHeader;

let offsetX,offsetY,dragging=false;

header.onmousedown=e=>{
dragging=true;
offsetX=e.clientX-menu.offsetLeft;
offsetY=e.clientY-menu.offsetTop;
};

document.onmousemove=e=>{
if(!dragging) return;
menu.style.left=(e.clientX-offsetX)+"px";
menu.style.top=(e.clientY-offsetY)+"px";
};

document.onmouseup=()=>dragging=false;

/* ===== collapse menu ===== */

toggleMenu.onclick=()=>wordMenu.classList.toggle("collapsed");

/* ===== rotate mandala ===== */

let rotation=0;

rotateMandala.onclick=function(){

rotation=(rotation+90)%360;

document.querySelector(".container")
.style.transform="rotate("+rotation+"deg)";

this.textContent="Rotate ("+rotation+"°)";

};

/* ===== drag scroll ===== */

let isDragging=false,startX,startY,scrollLeft,scrollTop;

document.addEventListener("mousedown",e=>{

if(e.target.closest("#wordMenu")) return;

isDragging=true;
document.body.classList.add("dragging");

startX=e.clientX;
startY=e.clientY;

scrollLeft=window.scrollX;
scrollTop=window.scrollY;

});

document.addEventListener("mousemove",e=>{

if(!isDragging) return;

window.scrollTo(
scrollLeft-(e.clientX-startX),
scrollTop-(e.clientY-startY)
);

});

document.addEventListener("mouseup",()=>{
isDragging=false;
document.body.classList.remove("dragging");
});

/* ===== savePuzzleProgress ===== */

function saveProgress(){

localStorage.setItem(
"goyaPuzzleProgress",
JSON.stringify(Object.keys(answerClips)
.filter(w => answerClips[w].classList.contains("visible")))
);

}

</script>

<script src="https://unpkg.com/image-map-resizer/js/imageMapResizer.min.js"></script>
<script>imageMapResize();</script>

</body>
</html>
